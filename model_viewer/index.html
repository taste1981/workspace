<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; background: #fff; color: #333; display: flex; flex-direction: column; }

.toolbar { display: flex; align-items: center; gap: 10px; padding: 6px 14px; background: #252536; color: #fff; z-index: 100; flex-shrink: 0; }
.toolbar .logo { font-weight: 700; font-size: 15px; letter-spacing: 0.3px; white-space: nowrap; }
.toolbar .logo span { color: #6cf; }
.toolbar button { background: #33334d; color: #ccc; border: 1px solid #444466; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background 0.15s; }
.toolbar button:hover { background: #44446a; color: #fff; }
.toolbar button.active { background: #556; border-color: #6cf; color: #6cf; }
.toolbar .sep { width: 1px; height: 20px; background: #444; }
.toolbar .info { font-size: 11px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
.toolbar .spacer { flex: 1; }
.toolbar .zoom { display: flex; gap: 3px; }
.toolbar .zoom button { padding: 3px 9px; font-size: 14px; font-weight: bold; }
.toolbar .search input { background: #33334d; border: 1px solid #444466; color: #eee; padding: 5px 8px; border-radius: 4px; width: 200px; font-size: 12px; outline: none; }
.toolbar .search input:focus { border-color: #6cf; }
.toolbar .search .cnt { font-size: 11px; color: #888; margin-left: 4px; min-width: 30px; }

.main { display: flex; flex: 1; overflow: hidden; }
.graph-area { flex: 1; position: relative; overflow: hidden; background: #fafafa; }
.graph-area svg { width: 100%; height: 100%; cursor: grab; }
.graph-area svg.dragging { cursor: grabbing; }

.node rect { stroke-width: 1.5; cursor: pointer; rx: 5; ry: 5; }
.node:hover rect { filter: brightness(0.9); }
.node.sel rect { stroke: #f60; stroke-width: 3; filter: drop-shadow(0 0 6px rgba(255,100,0,0.4)); }
.node.hl rect { stroke: #6cf; stroke-width: 2.5; }
.node .ntype { font-size: 11px; font-weight: 600; fill: #fff; pointer-events: none; }
.node .nname { font-size: 9px; fill: rgba(255,255,255,0.7); pointer-events: none; }
.edge path { fill: none; stroke: #c0c0c0; stroke-width: 1.4; }
.edge.sel path { stroke: #f60; stroke-width: 2.5; }
.edge-lbl { font-size: 8px; fill: #aaa; pointer-events: none; }

.sidebar { width: 340px; background: #fff; border-left: 1px solid #e0e0e0; overflow-y: auto; flex-shrink: 0; }
.sidebar.hidden { width: 0; border: none; overflow: hidden; }
.sidebar h3 { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; background: #f8f8f8; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1; }
.sec { border-bottom: 1px solid #f0f0f0; padding: 8px 14px; }
.sec .lbl { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 3px; }
.sec .val { font-size: 13px; color: #333; word-break: break-all; }
.sec .badge { display: inline-block; background: #e3f2fd; color: #1565c0; padding: 2px 7px; border-radius: 3px; font-weight: 600; font-size: 11px; }
.sec .tag { display: inline-block; background: #fff3e0; color: #e65100; padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 600; }
.tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
.tbl td { padding: 3px 0; vertical-align: top; }
.tbl td:first-child { color: #999; width: 38%; padding-right: 6px; }
.tbl td:last-child { color: #333; word-break: break-all; font-family: Consolas, Monaco, monospace; font-size: 10px; }
.port { display: flex; align-items: center; gap: 5px; padding: 2px 0; font-size: 11px; }
.port .pid { background: #f0f0f0; border-radius: 3px; padding: 1px 5px; font-size: 10px; color: #777; font-family: monospace; }
.port .pshape { font-family: monospace; font-size: 10px; color: #333; }
.port .ptype { font-size: 9px; color: #999; }
.conn { font-size: 11px; padding: 2px 0; cursor: pointer; color: #1565c0; }
.conn:hover { text-decoration: underline; }

.welcome { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #bbb; }
.welcome .icon { font-size: 56px; margin-bottom: 12px; opacity: 0.4; }
.welcome h2 { font-size: 18px; font-weight: 400; color: #999; margin-bottom: 6px; }
.welcome p { font-size: 13px; color: #bbb; }
.welcome .formats { font-size: 11px; color: #ccc; margin-top: 12px; }
.loading { position: absolute; inset: 0; background: rgba(250,250,250,0.92); display: flex; align-items: center; justify-content: center; z-index: 50; }
.loading .spin { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #6cf; border-radius: 50%; animation: sp 0.7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.loading .ltxt { margin-top: 10px; font-size: 13px; color: #999; }

.drop-ov { position: fixed; inset: 0; background: rgba(30,30,50,0.88); z-index: 1000; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.drop-ov.on { opacity: 1; pointer-events: all; }
.drop-box { border: 3px dashed #6cf; border-radius: 14px; padding: 50px 70px; text-align: center; }
.drop-box .di { font-size: 44px; margin-bottom: 10px; }
.drop-box .dt { font-size: 17px; color: #fff; }
.drop-box .ds { font-size: 12px; color: #888; margin-top: 6px; }

.search-dd { position: absolute; top: 42px; right: 14px; background: #252536; border: 1px solid #444; border-radius: 5px; max-height: 280px; overflow-y: auto; z-index: 200; min-width: 260px; display: none; }
.search-dd.vis { display: block; }
.search-dd .sri { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 6px; font-size: 12px; }
.search-dd .sri:hover { background: #33334d; }
.search-dd .sri .st { font-size: 10px; background: #444; padding: 2px 5px; border-radius: 3px; color: #ccc; }
.search-dd .sri .sn { color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sidebar::-webkit-scrollbar, .search-dd::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb, .search-dd::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
input[type="file"] { display: none; }
.node.carved rect { stroke: #4caf50 !important; stroke-width: 2.5; filter: drop-shadow(0 0 5px rgba(76,175,80,0.5)); }
.graph-area svg.selecting { cursor: crosshair !important; }
.sel-rect { fill: rgba(76,175,80,0.12); stroke: #4caf50; stroke-width: 1.5; stroke-dasharray: 5 3; pointer-events: none; }
.toolbar .carve-group { display: flex; align-items: center; gap: 6px; }
.toolbar .carve-group .sel-info { font-size: 11px; color: #4caf50; white-space: nowrap; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="logo"><span>Model</span> Viewer</div>
  <button id="btn-open">Open Model</button>
  <button id="btn-constants" title="Toggle constant/initializer nodes">Constants</button>
  <div class="sep"></div>
  <div class="carve-group" id="carve-group" style="display:none;">
    <button id="btn-select" title="Toggle selection mode: drag to select operators for carving">Select</button>
    <button id="btn-carve" style="display:none;" title="Carve selected subgraph and download as .tflite">Carve &amp; Save</button>
    <button id="btn-clear-sel" style="display:none;" title="Clear selection">Clear</button>
    <span class="sel-info" id="sel-info"></span>
  </div>
  <div class="sep"></div>
  <div class="info" id="model-info"></div>
  <div class="spacer"></div>
  <div class="zoom">
    <button id="btn-zi" title="Zoom in">+</button>
    <button id="btn-zo" title="Zoom out">&minus;</button>
    <button id="btn-fit" title="Fit">Fit</button>
  </div>
  <div class="search">
    <input type="text" id="sinput" placeholder="Search nodes... (Ctrl+F)" autocomplete="off">
    <span class="cnt" id="scnt"></span>
  </div>
</div>

<input type="file" id="finput" accept=".onnx,.tflite,.xml,.pb,.pbtxt,.dot,.gv">

<div class="main">
  <div class="graph-area" id="garea">
    <div class="welcome" id="welcome">
      <div class="icon">&#9881;</div>
      <h2>Model Viewer</h2>
      <p>Drag &amp; drop a model file or click "Open Model"</p>
      <div class="formats">Supported: ONNX &middot; TFLite &middot; OpenVINO IR (.xml) &middot; Graphviz (.dot)</div>
    </div>
    <svg id="svg" style="display:none;">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#c0c0c0"/></marker>
        <marker id="ah-s" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#f60"/></marker>
      </defs>
      <g id="groot"></g>
      <rect id="sel-rect" class="sel-rect" style="display:none;" x="0" y="0" width="0" height="0"/>
    </svg>
    <div class="loading" id="loading" style="display:none;"><div style="text-align:center;"><div class="spin"></div><div class="ltxt">Laying out graph...</div></div></div>
  </div>
  <div class="sidebar" id="sidebar">
    <h3>Properties</h3>
    <div id="details"><div class="sec"><div class="lbl">Open a model to begin</div></div></div>
  </div>
</div>

<div class="search-dd" id="sdd"></div>
<div class="drop-ov" id="dropov"><div class="drop-box"><div class="di">&#128206;</div><div class="dt">Drop model file here</div><div class="ds">.onnx &middot; .tflite &middot; .xml &middot; .dot</div></div></div>

<script>
// ==================== PROTOBUF DECODER (for ONNX) ====================
function pbReadVarint(buf, pos) {
  let val = 0, shift = 0;
  while (pos < buf.length) {
    const b = buf[pos++];
    val |= (b & 0x7f) * Math.pow(2, shift); // avoid bitwise for >32 bits
    shift += 7;
    if (!(b & 0x80)) return [val, pos];
    if (shift > 63) break;
  }
  return [val, pos];
}
function pbReadSVarint(buf, pos) {
  const [v, p] = pbReadVarint(buf, pos);
  return [v & 1 ? -(v + 1) / 2 : v / 2, p];
}
function pbReadF32(buf, pos) {
  const dv = new DataView(buf.buffer, buf.byteOffset + pos, 4);
  return [dv.getFloat32(0, true), pos + 4];
}
function pbReadF64(buf, pos) {
  const dv = new DataView(buf.buffer, buf.byteOffset + pos, 8);
  return [dv.getFloat64(0, true), pos + 8];
}
function pbReadFixed32(buf, pos) {
  const dv = new DataView(buf.buffer, buf.byteOffset + pos, 4);
  return [dv.getUint32(0, true), pos + 4];
}
function pbReadFixed64(buf, pos) {
  const dv = new DataView(buf.buffer, buf.byteOffset + pos, 8);
  const lo = dv.getUint32(0, true), hi = dv.getUint32(4, true);
  return [hi * 0x100000000 + lo, pos + 8];
}
function pbUTF8(buf, start, end) {
  const dec = new TextDecoder();
  return dec.decode(buf.subarray(start, end));
}
// Decode packed repeated varints
function pbPackedVarints(buf, start, end) {
  const out = []; let pos = start;
  while (pos < end) { const [v, p] = pbReadVarint(buf, pos); out.push(v); pos = p; }
  return out;
}
function pbPackedF32(buf, start, end) {
  const out = []; let pos = start;
  while (pos < end) { const [v, p] = pbReadF32(buf, pos); out.push(v); pos = p; }
  return out;
}
function pbPackedI64(buf, start, end) {
  return pbPackedVarints(buf, start, end); // for simplicity: int64 as varint
}

// ==================== ONNX PARSER ====================
const ONNX_DTYPE = {0:'undefined',1:'float32',2:'uint8',3:'int8',4:'uint16',5:'int16',6:'int32',7:'int64',8:'string',9:'bool',10:'float16',11:'float64',12:'uint32',13:'uint64',14:'complex64',15:'complex128',16:'bfloat16',17:'float8e4m3fn',18:'float8e4m3fnuz',19:'float8e5m2',20:'float8e5m2fnuz',21:'uint4',22:'int4',23:'float4e2m1'};
const ONNX_ATTR_TYPE = {0:'UNDEFINED',1:'FLOAT',2:'INT',3:'STRING',4:'TENSOR',5:'GRAPH',6:'FLOATS',7:'INTS',8:'STRINGS',9:'TENSORS',10:'GRAPHS',11:'SPARSE_TENSOR',12:'SPARSE_TENSORS',13:'TYPE_PROTO',14:'TYPE_PROTOS'};

function onnxParse(arrayBuf) {
  const buf = new Uint8Array(arrayBuf);
  return onnxDecodeModel(buf, 0, buf.length);
}

function onnxDecodeModel(buf, s, e) {
  const m = {ir_version:0, opset_import:[], producer_name:'', producer_version:'', domain:'', model_version:0, doc_string:'', graph:null, metadata:[]};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) { const [v, p2] = pbReadVarint(buf, p); p = p2; if (fn===1) m.ir_version=v; else if (fn===6) m.model_version=v; }
    else if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===3) m.producer_name = pbUTF8(buf,p,end);
      else if (fn===4) m.producer_version = pbUTF8(buf,p,end);
      else if (fn===5) m.domain = pbUTF8(buf,p,end);
      else if (fn===7) m.doc_string = pbUTF8(buf,p,end);
      else if (fn===8) m.graph = onnxDecodeGraph(buf,p,end);
      else if (fn===2) m.opset_import.push(onnxDecodeOpset(buf,p,end));
      else if (fn===14) m.metadata.push(onnxDecodeStrEntry(buf,p,end));
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return m;
}

function onnxDecodeGraph(buf, s, e) {
  const g = {name:'', doc_string:'', node:[], input:[], output:[], initializer:[], value_info:[]};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) { const [,p2] = pbReadVarint(buf,p); p = p2; }
    else if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) g.node.push(onnxDecodeNode(buf,p,end));
      else if (fn===2) g.name = pbUTF8(buf,p,end);
      else if (fn===10) g.doc_string = pbUTF8(buf,p,end);
      else if (fn===5) g.initializer.push(onnxDecodeTensor(buf,p,end));
      else if (fn===11) g.input.push(onnxDecodeValueInfo(buf,p,end));
      else if (fn===12) g.output.push(onnxDecodeValueInfo(buf,p,end));
      else if (fn===15) g.value_info.push(onnxDecodeValueInfo(buf,p,end));
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return g;
}

function onnxDecodeNode(buf, s, e) {
  const n = {input:[], output:[], name:'', op_type:'', domain:'', doc_string:'', attribute:[]};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) { const [,p2] = pbReadVarint(buf,p); p = p2; }
    else if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) n.input.push(pbUTF8(buf,p,end));
      else if (fn===2) n.output.push(pbUTF8(buf,p,end));
      else if (fn===3) n.name = pbUTF8(buf,p,end);
      else if (fn===4) n.op_type = pbUTF8(buf,p,end);
      else if (fn===7) n.doc_string = pbUTF8(buf,p,end);
      else if (fn===13) n.domain = pbUTF8(buf,p,end);
      else if (fn===5) n.attribute.push(onnxDecodeAttr(buf,p,end));
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return n;
}

function onnxDecodeAttr(buf, s, e) {
  const a = {name:'', type:0, f:0, i:0, s:'', t:null, floats:[], ints:[], strings:[], doc_string:'', ref_attr_name:''};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) {
      const [v, p2] = pbReadVarint(buf, p); p = p2;
      if (fn===3) a.i = v; // int64
      else if (fn===20) a.type = v;
    } else if (wt === 5) {
      const [v, p2] = pbReadF32(buf, p); p = p2;
      if (fn===2) a.f = v;
    } else if (wt === 2) {
      const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) a.name = pbUTF8(buf,p,end);
      else if (fn===4) a.s = pbUTF8(buf,p,end);
      else if (fn===13) a.doc_string = pbUTF8(buf,p,end);
      else if (fn===21) a.ref_attr_name = pbUTF8(buf,p,end);
      else if (fn===5) a.t = onnxDecodeTensor(buf,p,end);
      else if (fn===7) { // packed repeated floats
        if (a.floats.length === 0) a.floats = pbPackedF32(buf,p,end); else a.floats.push(...pbPackedF32(buf,p,end));
      } else if (fn===8) { // packed repeated ints
        if (a.ints.length === 0) a.ints = pbPackedVarints(buf,p,end); else a.ints.push(...pbPackedVarints(buf,p,end));
      } else if (fn===9) a.strings.push(pbUTF8(buf,p,end));
      p = end;
    } else if (wt === 1) { p += 8; }
  }
  return a;
}

function onnxDecodeTensor(buf, s, e) {
  const t = {dims:[], data_type:0, name:'', doc_string:'', raw_data_size:0};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) {
      const [v, p2] = pbReadVarint(buf, p); p = p2;
      if (fn===2) t.data_type = v;
    } else if (wt === 2) {
      const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) t.dims = pbPackedVarints(buf,p,end); // packed int64
      else if (fn===8) t.name = pbUTF8(buf,p,end);
      else if (fn===12) t.doc_string = pbUTF8(buf,p,end);
      else if (fn===9) t.raw_data_size = len; // skip raw_data
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return t;
}

function onnxDecodeValueInfo(buf, s, e) {
  const v = {name:'', doc_string:'', type:null};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) { const [,p2] = pbReadVarint(buf,p); p = p2; }
    else if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) v.name = pbUTF8(buf,p,end);
      else if (fn===2) v.type = onnxDecodeTypeProto(buf,p,end);
      else if (fn===3) v.doc_string = pbUTF8(buf,p,end);
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return v;
}

function onnxDecodeTypeProto(buf, s, e) {
  const tp = {tensor_type:null, denotation:''};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) { const [,p2] = pbReadVarint(buf,p); p = p2; }
    else if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) tp.tensor_type = onnxDecodeTensorType(buf,p,end);
      else if (fn===6) tp.denotation = pbUTF8(buf,p,end);
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return tp;
}

function onnxDecodeTensorType(buf, s, e) {
  const tt = {elem_type:0, shape:null};
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 0) { const [v, p2] = pbReadVarint(buf,p); p = p2; if (fn===1) tt.elem_type = v; }
    else if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===2) tt.shape = onnxDecodeShape(buf,p,end);
      p = end;
    } else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return tt;
}

function onnxDecodeShape(buf, s, e) {
  const dims = [];
  let p = s;
  while (p < e) {
    const [tag, p1] = pbReadVarint(buf, p); p = p1;
    const fn = tag >>> 3, wt = tag & 7;
    if (wt === 2) { const [len, p2] = pbReadVarint(buf, p); p = p2; const end = p + len;
      if (fn===1) dims.push(onnxDecodeDim(buf,p,end));
      p = end;
    } else if (wt === 0) { const [,p2] = pbReadVarint(buf,p); p = p2; }
    else if (wt === 5) { p += 4; } else if (wt === 1) { p += 8; }
  }
  return dims;
}

function onnxDecodeDim(buf, s, e) {
  let dim_value = null, dim_param = null;
  let p = s;

    } else if (rawLabel) {
      lines = rawLabel.split('\n').map(l => l.trim()).filter(Boolean);
    } else {
      lines = [id];
    }

    const firstLine = (lines[0] || id).trim();
    let type = firstLine, name = firstLine || id;

    // Try to extract OpenVINO op type: "opsetN::OpName_123" or "Namespace::OpName"
    const nsMatch = firstLine.match(/(\w+::\w+)/);
    if (nsMatch) type = nsMatch[1];

    // Determine category from type, color, or style
    let cat = CAT.op;
    const color = (attrs.color || '').toLowerCase();
    const fillcolor = (attrs.fillcolor || '').toLowerCase();
    if (/parameter|input/i.test(type)) cat = CAT.param;
    else if (/result|output/i.test(type)) cat = CAT.result;
    else if (/constant|const/i.test(type)) cat = CAT.const;
    else if (color === 'crimson' || fillcolor === 'crimson') cat = CAT.result;

    // Build attributes from remaining label lines
    const extraAttrs = {};
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line) continue;
      const ioMatch = line.match(/^((?:in|out)\d+):\s*(.*)/);
      if (ioMatch) {
        extraAttrs[ioMatch[1]] = ioMatch[2];
      } else {
        const kvMatch = line.match(/^([\w_]+)\s*[:=]\s*(.+)/);
        if (kvMatch) extraAttrs[kvMatch[1]] = kvMatch[2];
        else extraAttrs['info_' + i] = line;
      }
    }

    // Extract typed ports from label
    const inputs = [], outputs = [];
    for (const [k, v] of Object.entries(extraAttrs)) {
      const portMatch = k.match(/^(in|out)(\d+)$/);
      if (portMatch) {
        const typeMatch = v.match(/\{([^}]+)\}/);
        const shapeMatch = v.match(/\[([^\]]+)\]/);
        const port = {
          name: k,
          type: typeMatch ? typeMatch[1] : '',
          shape: shapeMatch ? shapeMatch[1].split(',').map(s => s.trim()) : [],
          portName: k
        };
        if (portMatch[1] === 'in') inputs.push(port);
        else outputs.push(port);
      }
    }

    return { id, name, type, cat, attrs: extraAttrs, inputs, outputs };
  }

  // Build nodes
  const nodeMap = {};
  for (const [id, n] of Object.entries(parsed.nodes)) {
    const cl = classifyNode(id, n.attrs);
    nodes.push({
      id: cl.id, name: cl.name, type: cl.type, category: cl.cat,
      attrs: cl.attrs, inputs: cl.inputs, outputs: cl.outputs,
      extra: { dotAttrs: n.attrs }
    });
    nodeMap[id] = nodes[nodes.length - 1];
  }

  // Build edges
  for (const e of parsed.edges) {
    const rawLabel = e.attrs.label || '';
    const label = rawLabel.replace(/<[^>]*>/g, '').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').trim();
    edges.push({
      from: e.from, fromPort: e.fromPort || '', to: e.to, toPort: e.toPort || '', label
    });
  }

  return { meta, nodes, edges };
}

// ==================== UNIFIED GRAPH MODEL ====================
// { meta: {...}, nodes: [{id, name, type, category, attrs, inputs:[{name,type,shape}], outputs:[{name,type,shape}], extra}], edges: [{from, fromPort, to, toPort, label}] }

const CAT = { param:'param', result:'result', const:'const', op:'op' };

function onnxToGraph(m) {
  const g = m.graph;
  if (!g) return null;
  const meta = { name: g.name||m.domain||'', format: 'ONNX', producer: m.producer_name+(m.producer_version?' v'+m.producer_version:''), irVersion: m.ir_version, opsets: m.opset_import.map(o=>(o.domain||'ai.onnx')+' v'+o.version).join(', '), metadata: m.metadata };

  const initNames = new Set(g.initializer.map(t => t.name));
  const tensorInfo = {}; // name -> {type, shape}
  // Collect type info from graph inputs, outputs, value_info
  for (const vi of [...g.input, ...g.output, ...g.value_info]) {
    const info = {};
    if (vi.type && vi.type.tensor_type) {
      info.type = ONNX_DTYPE[vi.type.tensor_type.elem_type] || 'unknown';
      if (vi.type.tensor_type.shape) info.shape = vi.type.tensor_type.shape.map(d => String(d));
    }
    tensorInfo[vi.name] = info;
  }
  for (const init of g.initializer) {
    tensorInfo[init.name] = { type: ONNX_DTYPE[init.data_type]||'unknown', shape: init.dims.map(String) };
  }

  const nodes = [], edges = [];
  let nid = 0;

  // Tensor name -> producing node/port
  const tensorProducer = {}; // name -> {nodeId, portIdx}

  // Parameter nodes (inputs that are not initializers)
  for (const vi of g.input) {
    if (initNames.has(vi.name)) continue;
    const info = tensorInfo[vi.name] || {};
    const id = 'n' + nid++;
    nodes.push({ id, name: vi.name, type: 'Input', category: CAT.param, attrs: {}, inputs: [],
      outputs: [{ name: vi.name, type: info.type||'', shape: info.shape||[] }], extra: { doc: vi.doc_string } });
    tensorProducer[vi.name] = { nodeId: id, portIdx: 0 };
  }

  // Initializer (constant) nodes
  for (const init of g.initializer) {
    const info = tensorInfo[init.name] || {};
    const id = 'n' + nid++;
    const attrs = { shape: '[' + init.dims.join(', ') + ']', type: ONNX_DTYPE[init.data_type]||'unknown' };
    if (init.raw_data_size > 0) attrs.data_size = init.raw_data_size + ' bytes';
    nodes.push({ id, name: init.name, type: 'Initializer', category: CAT.const, attrs,
      inputs: [], outputs: [{ name: init.name, type: info.type||'', shape: info.shape||init.dims.map(String) }], extra: {} });
    tensorProducer[init.name] = { nodeId: id, portIdx: 0 };
  }

  // Op nodes
  for (const node of g.node) {
    const id = 'n' + nid++;
    const attrs = {};
    for (const a of node.attribute) {
      if (a.type === 1) attrs[a.name] = String(a.f);
      else if (a.type === 2) attrs[a.name] = String(a.i);
      else if (a.type === 3) attrs[a.name] = a.s;
      else if (a.type === 6) attrs[a.name] = '[' + a.floats.map(x => x.toPrecision(6)).join(', ') + ']';
      else if (a.type === 7) attrs[a.name] = '[' + a.ints.join(', ') + ']';
      else if (a.type === 8) attrs[a.name] = '[' + a.strings.join(', ') + ']';
      else if (a.type === 4 && a.t) attrs[a.name] = `Tensor<${ONNX_DTYPE[a.t.data_type]||'?'}>[${a.t.dims.join(',')}]`;
      else attrs[a.name] = ONNX_ATTR_TYPE[a.type] || '?';
    }
    const inputs = node.input.map((name, i) => {
      const info = tensorInfo[name] || {};
      return { name: name||'', type: info.type||'', shape: info.shape||[], portName: 'input_'+i };
    });
    const outputs = node.output.map((name, i) => {
      const info = tensorInfo[name] || {};
      return { name: name||'', type: info.type||'', shape: info.shape||[], portName: 'output_'+i };
    });
    const extra = { domain: node.domain, doc: node.doc_string };
    nodes.push({ id, name: node.name || node.op_type, type: node.op_type, category: CAT.op, attrs, inputs, outputs, extra });

    // Register outputs
    for (let i = 0; i < node.output.length; i++) {
      if (node.output[i]) tensorProducer[node.output[i]] = { nodeId: id, portIdx: i };
    }

    // Create edges from inputs
    for (let i = 0; i < node.input.length; i++) {
      const iname = node.input[i];
      if (!iname) continue;
      const prod = tensorProducer[iname];
      if (prod) {
        const info = tensorInfo[iname] || {};
        const shapeStr = info.shape ? '['+info.shape.join(',')+']' : '';
        edges.push({ from: prod.nodeId, fromPort: prod.portIdx, to: id, toPort: i, label: shapeStr });
      }
    }
  }

  // Result nodes
  for (const vi of g.output) {
    const info = tensorInfo[vi.name] || {};
    const id = 'n' + nid++;
    nodes.push({ id, name: vi.name, type: 'Output', category: CAT.result, attrs: {},
      inputs: [{ name: vi.name, type: info.type||'', shape: info.shape||[] }], outputs: [], extra: { doc: vi.doc_string } });
    const prod = tensorProducer[vi.name];
    if (prod) {
      const shapeStr = info.shape ? '['+info.shape.join(',')+']' : '';
      edges.push({ from: prod.nodeId, fromPort: prod.portIdx, to: id, toPort: 0, label: shapeStr });
    }
  }

  return { meta, nodes, edges };
}

function tflToGraph(m) {
  const sg = m.subgraphs[0];
  if (!sg) return null;
  const meta = { name: m.description||sg.name||'', format: 'TFLite', producer: 'TensorFlow Lite', irVersion: 'v'+m.version, opsets: '' };

  const nodes = [], edges = [];
  let nid = 0;

  // Map tensor index to producer
  const tensorProducer = {};

  // Subgraph inputs → Parameter nodes
  for (const ti of sg.inputs) {
    const t = sg.tensors[ti];
    if (!t) continue;
    const id = 'n' + nid++;
    const typeStr = TFL_TYPES[t.type] || 'unknown';
    nodes.push({ id, name: t.name||`input_${ti}`, type: 'Input', category: CAT.param, attrs: {},
      inputs: [], outputs: [{ name: t.name, type: typeStr, shape: t.shape.map(String) }],
      extra: { tensorIdx: ti, quant: t.quant } });
    tensorProducer[ti] = { nodeId: id, portIdx: 0 };
  }

  // Operators → Op nodes
  for (let oi = 0; oi < sg.operators.length; oi++) {
    const op = sg.operators[oi];
    const opc = m.opCodes[op.opcode_index];
    const opName = opc ? (opc.code === 32 ? (opc.custom||'CUSTOM') : (TFL_OPS[opc.code]||'OP_'+opc.code)) : 'UNKNOWN';
    const id = 'n' + nid++;

    const inputs = op.inputs.filter(i => i >= 0).map((ti, pi) => {
      const t = sg.tensors[ti];
      return { name: t?t.name:'', type: t?TFL_TYPES[t.type]||'':'', shape: t?t.shape.map(String):[], portName: 'input_'+pi, tensorIdx: ti };
    });
    const outputs = op.outputs.map((ti, pi) => {
      const t = sg.tensors[ti];
      return { name: t?t.name:'', type: t?TFL_TYPES[t.type]||'':'', shape: t?t.shape.map(String):[], portName: 'output_'+pi, tensorIdx: ti };
    });

    // Collect quantization info from output tensors
    const attrs = {};
    for (const out of outputs) {
      const t = sg.tensors[out.tensorIdx];
      if (t && t.quant) {
        if (t.quant.scale.length > 0) attrs['output_scale'] = t.quant.scale.length > 4 ? `[${t.quant.scale.slice(0,4).join(', ')}, ...]` : `[${t.quant.scale.join(', ')}]`;
        if (t.quant.zero_point.length > 0) attrs['output_zp'] = t.quant.zero_point.length > 4 ? `[${t.quant.zero_point.slice(0,4).join(', ')}, ...]` : `[${t.quant.zero_point.join(', ')}]`;
      }
    }

    // Check if any input is an initializer (buffer > 0)
    const constInputs = [];
    for (let pi = 0; pi < op.inputs.length; pi++) {
      const ti = op.inputs[pi];
      if (ti < 0) continue;
      const t = sg.tensors[ti];
      if (t && t.buffer > 0 && !sg.inputs.includes(ti) && !tensorProducer[ti]) {
        // This is a constant tensor
        const cid = 'n' + nid++;
        const typeStr = TFL_TYPES[t.type] || 'unknown';
        const cattrs = { shape: '[' + t.shape.join(', ') + ']', type: typeStr };
        if (t.quant) {
          if (t.quant.scale.length) cattrs.scale = t.quant.scale.length > 4 ? `[${t.quant.scale.slice(0,4).join(', ')}, ...]` : `[${t.quant.scale.join(', ')}]`;
          if (t.quant.zero_point.length) cattrs.zero_point = t.quant.zero_point.length > 4 ? `[${t.quant.zero_point.slice(0,4).join(', ')}, ...]` : `[${t.quant.zero_point.join(', ')}]`;
          if (t.quant.quantized_dimension) cattrs.quantized_dimension = String(t.quant.quantized_dimension);
        }
        nodes.push({ id: cid, name: t.name||`const_${ti}`, type: 'Constant', category: CAT.const,
          attrs: cattrs, inputs: [], outputs: [{ name: t.name, type: typeStr, shape: t.shape.map(String) }],
          extra: { tensorIdx: ti, quant: t.quant } });
        tensorProducer[ti] = { nodeId: cid, portIdx: 0 };
        constInputs.push(ti);
      }
    }

    const extra = { opcode: opName, opIndex: oi, tensors: {} };
    // Store full tensor info for detail view
    for (const inp of inputs) {
      const t = sg.tensors[inp.tensorIdx];
      if (t) extra.tensors[inp.tensorIdx] = t;
    }
    for (const out of outputs) {
      const t = sg.tensors[out.tensorIdx];
      if (t) extra.tensors[out.tensorIdx] = t;
    }

    nodes.push({ id, name: opName + '_' + oi, type: opName, category: CAT.op, attrs, inputs, outputs, extra });

    // Register outputs
    for (let pi = 0; pi < op.outputs.length; pi++) {
      tensorProducer[op.outputs[pi]] = { nodeId: id, portIdx: pi };
    }

    // Create edges
    let portIdx = 0;
    for (const ti of op.inputs) {
      if (ti < 0) { portIdx++; continue; }
      const prod = tensorProducer[ti];
      if (prod) {
        const t = sg.tensors[ti];
        const label = t ? '['+t.shape.join(',')+']' : '';
        edges.push({ from: prod.nodeId, fromPort: prod.portIdx, to: id, toPort: portIdx, label });
      }
      portIdx++;
    }
  }

  // Subgraph outputs → Result nodes
  for (const ti of sg.outputs) {
    const t = sg.tensors[ti];
    if (!t) continue;
    const id = 'n' + nid++;
    const typeStr = TFL_TYPES[t.type] || 'unknown';
    nodes.push({ id, name: t.name||`output_${ti}`, type: 'Output', category: CAT.result, attrs: {},
      inputs: [{ name: t.name, type: typeStr, shape: t.shape.map(String) }], outputs: [],
      extra: { tensorIdx: ti, quant: t.quant } });
    const prod = tensorProducer[ti];
    if (prod) {
      edges.push({ from: prod.nodeId, fromPort: prod.portIdx, to: id, toPort: 0, label: '['+t.shape.join(',')+']' });
    }
  }

  return { meta, nodes, edges };
}

function ovirToGraph(m) {
  const meta = { name: m.meta.name, format: 'OpenVINO IR', producer: '', irVersion: 'v'+m.meta.version, opsets: '' };
  const nodes = [], edges = [];

  for (const l of m.layers) {
    let cat = CAT.op;
    if (l.type === 'Parameter') cat = CAT.param;
    else if (l.type === 'Result') cat = CAT.result;
    else if (l.type === 'Const' || l.type === 'Constant') cat = CAT.const;

    const inputs = l.inputs.map(p => ({
      name: '', type: p.precision, shape: p.dims, portName: 'port_'+p.id, rtInfo: p.rtInfo
    }));
    const outputs = l.outputs.map(p => ({
      name: p.names||'', type: p.precision, shape: p.dims, portName: 'port_'+p.id, rtInfo: p.rtInfo
    }));
    nodes.push({ id: l.id, name: l.name, type: l.type, category: cat, attrs: l.attrs, inputs, outputs,
      extra: { version: l.version, rtInfo: l.rtInfo } });
  }

  for (const e of m.edges) {
    const src = m.layerMap[e.fromLayer];
    let label = '';
    if (src) {
      const port = src.outputs.find(p => p.id === e.fromPort);
      if (port && port.dims.length) label = '['+port.dims.join(',')+']';
    }
    edges.push({ from: e.fromLayer, fromPort: parseInt(e.fromPort)||0, to: e.toLayer, toPort: parseInt(e.toPort)||0, label });
  }

  return { meta, nodes, edges };
}

let selId = null;

let sMatches = [];

// ==================== FILE HANDLING ====================
$('btn-open').onclick = () => $('finput').click();

$('btn-constants').onclick = function() { showConst = !showConst; this.classList.toggle('active', showConst); if (graph) doLayout(); };

let dc = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dc++; dropov.classList.add('on'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dc--; if (!dc) dropov.classList.remove('on'); });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); dc=0; dropov.classList.remove('on');
  const f = Array.from(e.dataTransfer.files); const mf = f.find(x=>x.name.match(/\.(onnx|tflite|xml|pb|pbtxt)$/i));
  if (mf) loadFile(mf);
});

function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'xml') {
    const r = new FileReader();
    r.onload = e => {
      const parsed = ovirParse(e.target.result);
      if (!parsed) { alert('Failed to parse OpenVINO IR XML'); return; }
      graph = ovirToGraph(parsed);
      onModelLoaded(file.name);
    };
    r.readAsText(file);
  } else if (ext === 'onnx') {
    const r = new FileReader();
    r.onload = e => {
      try {
        const parsed = onnxParse(e.target.result);
        graph = onnxToGraph(parsed);
        if (!graph) { alert('Failed to parse ONNX model'); return; }
      } catch (err) { alert('ONNX parse error: ' + err.message); return; }
      onModelLoaded(file.name);
    };
    r.readAsArrayBuffer(file);
  } else if (ext === 'tflite') {
    const r = new FileReader();
    r.onload = e => {
      try {
        tflParsed = tflParse(e.target.result);
        graph = tflToGraph(tflParsed);
        if (!graph) { alert('Failed to parse TFLite model'); return; }
      } catch (err) { alert('TFLite parse error: ' + err.message); return; }
      onModelLoaded(file.name);
    };
    r.readAsArrayBuffer(file);
  } else if (ext === 'dot' || ext === 'gv') {
    const r = new FileReader();
    r.onload = e => {
      try {
        const parsed = dotParse(e.target.result);
        graph = dotToGraph(parsed);
        if (!graph || graph.nodes.length === 0) { alert('Failed to parse DOT file or no nodes found'); return; }
      } catch (err) { alert('DOT parse error: ' + err.message); return; }
      onModelLoaded(file.name);
    };
    r.readAsText(file);
  } else {
    alert('Unsupported format: .' + ext);
  }
}

function onModelLoaded(filename) {
  welc.style.display = 'none';
  svgEl.style.display = '';
  const m = graph.meta;
  infoEl.textContent = `${filename}  |  ${m.format}  |  ${graph.nodes.length} nodes  |  ${graph.edges.length} edges`;
  selId = null;
  carveSet.clear(); updateCarveUI();
  // Show carve tools for TFLite models
  $('carve-group').style.display = m.format === 'TFLite' ? 'flex' : 'none';
  doLayout();
  showModelProps();
}

// ==================== LAYOUT ====================
const DAGRE_LIMIT = 500;
const NW = 170, NH = 40;

function visibleNodes() {
  if (showConst) return graph.nodes;
  return graph.nodes.filter(n => n.category !== CAT.const);
}
function visibleEdges() {
  const vids = new Set(visibleNodes().map(n=>n.id));
  return graph.edges.filter(e => vids.has(e.from) && vids.has(e.to));
}

function doLayout() {
  loadEl.style.display = 'flex';
  requestAnimationFrame(() => setTimeout(() => {
    try {
      const vn = visibleNodes(), ve = visibleEdges();
      let lg;
      if (vn.length <= DAGRE_LIMIT) {
        try { lg = dagreLayout(vn, ve); } catch(e) { console.warn('Dagre fail:', e.message); lg = iterLayout(vn, ve); }
      } else { lg = iterLayout(vn, ve); }
      render(lg);
      fit();
    } catch(e) { console.error(e); alert('Layout error: '+e.message); }
    loadEl.style.display = 'none';
  }, 30));
}

function dagreLayout(vn, ve) {
  const g = new dagre.graphlib.Graph({multigraph:true});
  g.setGraph({rankdir:'TB',nodesep:35,ranksep:55,edgesep:12,marginx:25,marginy:25});
  g.setDefaultEdgeLabel(()=>({}));
  for (const n of vn) g.setNode(n.id,{label:n.name,width:NW,height:NH,node:n});
  for (const e of ve) { const k=`${e.from}:${e.fromPort}->${e.to}:${e.toPort}`; g.setEdge(e.from,e.to,{label:e.label},k); }
  dagre.layout(g);
  return g;
}

function iterLayout(vn, ve) {
  const ids = new Set(vn.map(n=>n.id));
  const ch={}, pa={}, indeg={};
  for (const n of vn) { ch[n.id]=[]; pa[n.id]=[]; indeg[n.id]=0; }
  for (const e of ve) { if(ids.has(e.from)&&ids.has(e.to)){ch[e.from].push(e.to);pa[e.to].push(e.from);indeg[e.to]++;} }
  const rank={}, q=[], topo=[];
  for(const n of vn) if(indeg[n.id]===0){q.push(n.id);rank[n.id]=0;}
  let h=0;
  while(h<q.length){const id=q[h++];topo.push(id);for(const c of ch[id]){rank[c]=Math.max(rank[c]||0,rank[id]+1);indeg[c]--;if(indeg[c]===0)q.push(c);}}
  for(const n of vn) if(rank[n.id]===undefined){rank[n.id]=0;topo.push(n.id);}
  const rg={};let mr=0;
  for(const id of topo){const r=rank[id];if(!rg[r])rg[r]=[];rg[r].push(id);if(r>mr)mr=r;}
  const px={},py={};
  for(let r=0;r<=mr;r++){const g=rg[r]||[];const tw=g.length*NW+(g.length-1)*35;const sx=-tw/2+NW/2;for(let i=0;i<g.length;i++){px[g[i]]=sx+i*(NW+35);py[g[i]]=r*(NH+55);}}
  for(let sw=0;sw<2;sw++){
    for(let r=1;r<=mr;r++){const g=rg[r]||[];const b={};for(const id of g){const ps=pa[id];if(ps.length){let s=0;for(const p of ps)s+=px[p];b[id]=s/ps.length;}else b[id]=px[id];}g.sort((a,b2)=>b[a]-b[b2]);const tw=g.length*NW+(g.length-1)*35;const sx=-tw/2+NW/2;for(let i=0;i<g.length;i++)px[g[i]]=sx+i*(NW+35);}
    for(let r=mr-1;r>=0;r--){const g=rg[r]||[];const b={};for(const id of g){const cs=ch[id];if(cs.length){let s=0;for(const c of cs)s+=px[c];b[id]=s/cs.length;}else b[id]=px[id];}g.sort((a,b2)=>b[a]-b[b2]);const tw=g.length*NW+(g.length-1)*35;const sx=-tw/2+NW/2;for(let i=0;i<g.length;i++)px[g[i]]=sx+i*(NW+35);}
  }
  const nodeMap={}; for(const n of vn) nodeMap[n.id]=n;
  const nd={};for(const n of vn) nd[n.id]={x:px[n.id],y:py[n.id],width:NW,height:NH,node:n};
  const el=[], edm={};
  for(const e of ve){if(!ids.has(e.from)||!ids.has(e.to))continue;const k=`${e.from}:${e.fromPort}->${e.to}:${e.toPort}`;
    const s=nd[e.from],d=nd[e.to];el.push({v:e.from,w:e.to,name:k});
    edm[k]={label:e.label,points:[{x:s.x,y:s.y+NH/2},{x:(s.x+d.x)/2,y:(s.y+d.y)/2},{x:d.x,y:d.y-NH/2}]};}
  return {nodes(){return Object.keys(nd);},node(id){return nd[id];},edges(){return el;},edge(e){return edm[e.name];}};
}

function render(lg) {
  rootG.innerHTML = '';
  const eg = ns('g'); eg.setAttribute('class','eg');
  const ng = ns('g'); ng.setAttribute('class','ng');
  rootG.appendChild(eg); rootG.appendChild(ng);

  for (const e of lg.edges()) {
    const ed = lg.edge(e); if(!ed||!ed.points||ed.points.length<2)continue;
    const g = ns('g'); g.setAttribute('class','edge'); g.dataset.from=e.v; g.dataset.to=e.w;
    const p = ns('path'); p.setAttribute('d',epath(ed.points)); p.setAttribute('marker-end','url(#ah)'); g.appendChild(p);
    if (ed.label) { const mid=ed.points[Math.floor(ed.points.length/2)]; const t=ns('text');t.setAttribute('class','edge-lbl');t.setAttribute('x',mid.x+3);t.setAttribute('y',mid.y-3);t.textContent=ed.label;g.appendChild(t); }
    eg.appendChild(g);
  }

  for (const nid of lg.nodes()) {
    const nd = lg.node(nid); if(!nd)continue;
    const n = nd.node, x = nd.x-nd.width/2, y = nd.y-nd.height/2, col = opColor(n.type);
    const g = ns('g'); g.setAttribute('class','node'); g.setAttribute('transform',`translate(${x},${y})`); g.dataset.id=n.id;
    const r = ns('rect'); r.setAttribute('width',nd.width); r.setAttribute('height',nd.height); r.setAttribute('fill',col); r.setAttribute('stroke',shade(col,-20)); g.appendChild(r);
    const tt = ns('text'); tt.setAttribute('class','ntype'); tt.setAttribute('x',nd.width/2); tt.setAttribute('y',n.name&&n.name!==n.type?16:22); tt.setAttribute('text-anchor','middle');
    if(n.type==='Convert'||n.type==='CAST'||n.type==='Cast')tt.setAttribute('fill','#333');
    tt.textContent=n.type; g.appendChild(tt);
    if(n.name&&n.name!==n.type){const nt=ns('text');nt.setAttribute('class','nname');nt.setAttribute('x',nd.width/2);nt.setAttribute('y',30);nt.setAttribute('text-anchor','middle');
      if(n.type==='Convert'||n.type==='CAST')nt.setAttribute('fill','#666');
      nt.textContent=n.name.length>22?n.name.slice(0,22)+'...':n.name;g.appendChild(nt);}
    g.addEventListener('click',ev=>{ev.stopPropagation();selectNode(n.id);});
    ng.appendChild(g);
  }
  svgEl.addEventListener('click',()=>selectNode(null));
}

function ns(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag);}
function epath(pts){if(pts.length===2)return`M${pts[0].x} ${pts[0].y}L${pts[1].x} ${pts[1].y}`;let d=`M${pts[0].x} ${pts[0].y}`;for(let i=1;i<pts.length-1;i++){const p1=pts[i],p2=pts[i+1];d+=` Q${p1.x} ${p1.y} ${(p1.x+p2.x)/2} ${(p1.y+p2.y)/2}`;}const l=pts[pts.length-1];d+=` L${l.x} ${l.y}`;return d;}
function shade(hex,pct){const n=parseInt(hex.slice(1),16);const r=Math.min(255,Math.max(0,(n>>16)+pct));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+pct));const b=Math.min(255,Math.max(0,(n&0xff)+pct));return'#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

// ==================== PAN / ZOOM ====================
function applyTx(){rootG.setAttribute('transform',`translate(${tx},${ty}) scale(${sc})`);}
svgEl.addEventListener('wheel',e=>{e.preventDefault();const r=garea.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const d=e.deltaY>0?0.9:1.1;const ns2=Math.min(5,Math.max(0.02,sc*d));tx=mx-(mx-tx)*(ns2/sc);ty=my-(my-ty)*(ns2/sc);sc=ns2;applyTx();},{passive:false});
svgEl.addEventListener('mousedown',e=>{if(e.button!==0||selectMode)return;if(e.target===svgEl||e.target===rootG||e.target.closest('.eg')){pan=true;px=e.clientX-tx;py=e.clientY-ty;svgEl.classList.add('dragging');}});
window.addEventListener('mousemove',e=>{if(!pan)return;tx=e.clientX-px;ty=e.clientY-py;applyTx();});
window.addEventListener('mouseup',()=>{pan=false;svgEl.classList.remove('dragging');});
$('btn-zi').onclick=()=>{const r=garea.getBoundingClientRect();const cx=r.width/2,cy=r.height/2;const ns2=Math.min(5,sc*1.3);tx=cx-(cx-tx)*(ns2/sc);ty=cy-(cy-ty)*(ns2/sc);sc=ns2;applyTx();};
$('btn-zo').onclick=()=>{const r=garea.getBoundingClientRect();const cx=r.width/2,cy=r.height/2;const ns2=Math.max(0.02,sc/1.3);tx=cx-(cx-tx)*(ns2/sc);ty=cy-(cy-ty)*(ns2/sc);sc=ns2;applyTx();};
$('btn-fit').onclick=fit;

function fit(){const bb=rootG.getBBox();if(!bb.width||!bb.height)return;const r=garea.getBoundingClientRect();const pd=30;const sx=(r.width-pd*2)/bb.width,sy=(r.height-pd*2)/bb.height;sc=Math.min(sx,sy,2);tx=(r.width-bb.width*sc)/2-bb.x*sc;ty=(r.height-bb.height*sc)/2-bb.y*sc;applyTx();}

function selectNode(id) {
  selId = id;
  rootG.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
  rootG.querySelectorAll('.edge').forEach(e=>{e.classList.remove('sel');const p=e.querySelector('path');if(p)p.setAttribute('marker-end','url(#ah)');});

    if (el) el.classList.add('sel');
    rootG.querySelectorAll('.edge').forEach(e=>{if(e.dataset.from===id||e.dataset.to===id){e.classList.add('sel');const p=e.querySelector('path');if(p)p.setAttribute('marker-end','url(#ah-s)');}});

window.selectNode = selectNode;

function navTo(id) {
  const el = rootG.querySelector(`.node[data-id="${CSS.escape(id)}"]`);
  if (!el) return;
  const m = el.getAttribute('transform')?.match(/translate\(([\d.e+-]+),([\d.e+-]+)\)/);
  if (!m) return;
  const nx = parseFloat(m[1])+NW/2, ny = parseFloat(m[2])+NH/2;
  const r = garea.getBoundingClientRect();
  if (sc < 0.5) sc = 1;
  tx = r.width/2 - nx*sc; ty = r.height/2 - ny*sc;
  applyTx();
}

function H(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showModelProps() {
  if (!graph) return;
  const m = graph.meta;
  let h = sec('Format', `<span class="badge">${H(m.format)}</span>`);
  if (m.name) h += sec('Name', H(m.name));
  if (m.producer) h += sec('Producer', H(m.producer));
  if (m.irVersion) h += sec('Version', H(m.irVersion));
  if (m.opsets) h += sec('Opsets', H(m.opsets));
  h += sec('Nodes', graph.nodes.length);
  h += sec('Edges', graph.edges.length);

  // Op type stats
  const tc = {};
  for (const n of graph.nodes) tc[n.type] = (tc[n.type]||0)+1;
  const sorted = Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  h += '<div class="sec"><div class="lbl">Op Types</div><table class="tbl">';
  for (const [t,c] of sorted) h += `<tr><td>${H(t)}</td><td>${c}</td></tr>`;
  h += '</table></div>';

  // Metadata
  if (m.metadata && m.metadata.length) {
    h += '<div class="sec"><div class="lbl">Metadata</div><table class="tbl">';
    for (const e of m.metadata) h += `<tr><td>${H(e.key)}</td><td>${H(e.value)}</td></tr>`;
    h += '</table></div>';
  }
  details.innerHTML = h;
}

function showNodeDetails(id) {
  const node = graph.nodes.find(n => n.id === id);
  if (!node) return;
  let h = sec('Name', H(node.name));
  h += sec('Type', `<span class="badge">${H(node.type)}</span>`);
  h += sec('ID', H(node.id));
  if (node.extra?.domain) h += sec('Domain', H(node.extra.domain));
  if (node.extra?.version) h += sec('Version', H(node.extra.version));
  if (node.extra?.doc) h += sec('Description', H(node.extra.doc));

  // Attributes
  const ak = Object.keys(node.attrs);
  if (ak.length) {
    h += '<div class="sec"><div class="lbl">Attributes</div><table class="tbl">';
    for (const k of ak) {
      const v = node.attrs[k];
      const d = v && v.length > 300 ? v.slice(0,300)+'...' : v;
      h += `<tr><td>${H(k)}</td><td>${H(d)}</td></tr>`;
    }
    h += '</table></div>';
  }

  // Inputs
  if (node.inputs.length) {
    h += '<div class="sec"><div class="lbl">Inputs</div>';
    for (let i = 0; i < node.inputs.length; i++) {
      const inp = node.inputs[i];
      h += portHtml(inp, i);
    }
    // Connected from
    const srcs = graph.edges.filter(e => e.to === id);
    if (srcs.length) {
      h += '<div style="margin-top:4px;font-size:10px;color:#aaa;">Connected from:</div>';
      for (const e of srcs) {
        const sn = graph.nodes.find(n=>n.id===e.from);
        const nm = sn ? `${sn.name} (${sn.type})` : e.from;
        h += `<div class="conn" onclick="selectNode('${H(e.from)}');navTo('${H(e.from)}')">&larr; ${H(nm)}</div>`;
      }
    }
    h += '</div>';
  }

  // Outputs
  if (node.outputs.length) {
    h += '<div class="sec"><div class="lbl">Outputs</div>';
    for (let i = 0; i < node.outputs.length; i++) {
      const out = node.outputs[i];
      h += portHtml(out, i);
    }
    // Connected to
    const dsts = graph.edges.filter(e => e.from === id);
    if (dsts.length) {
      h += '<div style="margin-top:4px;font-size:10px;color:#aaa;">Connected to:</div>';
      for (const e of dsts) {
        const dn = graph.nodes.find(n=>n.id===e.to);
        const nm = dn ? `${dn.name} (${dn.type})` : e.to;
        h += `<div class="conn" onclick="selectNode('${H(e.to)}');navTo('${H(e.to)}')">&rarr; ${H(nm)}</div>`;
      }
    }
    h += '</div>';
  }

  // Quantization info (TFLite)
  if (node.extra?.quant) {
    const q = node.extra.quant;
    h += '<div class="sec"><div class="lbl">Quantization</div><table class="tbl">';
    if (q.scale?.length) h += `<tr><td>scale</td><td>${H(q.scale.length > 8 ? q.scale.slice(0,8).join(', ')+', ...' : q.scale.join(', '))}</td></tr>`;
    if (q.zero_point?.length) h += `<tr><td>zero_point</td><td>${H(q.zero_point.length > 8 ? q.zero_point.slice(0,8).join(', ')+', ...' : q.zero_point.join(', '))}</td></tr>`;
    if (q.min?.length) h += `<tr><td>min</td><td>${H(q.min.join(', '))}</td></tr>`;
    if (q.max?.length) h += `<tr><td>max</td><td>${H(q.max.join(', '))}</td></tr>`;
    if (q.quantized_dimension) h += `<tr><td>axis</td><td>${q.quantized_dimension}</td></tr>`;
    h += '</table></div>';
  }

  // Tensor details for TFLite operator nodes
  if (node.extra?.tensors) {
    const tkeys = Object.keys(node.extra.tensors);
    if (tkeys.length) {
      h += '<div class="sec"><div class="lbl">Tensor Details</div>';
      for (const ti of tkeys) {
        const t = node.extra.tensors[ti];
        const typeStr = TFL_TYPES[t.type] || '?';
        h += `<div style="font-size:10px;padding:2px 0;"><span class="tag">${H(t.name||'tensor_'+ti)}</span> ${H(typeStr)} [${t.shape.join(',')}]`;
        if (t.quant && t.quant.scale?.length) {
          h += `<div style="padding-left:8px;font-size:9px;color:#888;">scale: ${t.quant.scale.length > 4 ? t.quant.scale.slice(0,4).join(', ')+', ...' : t.quant.scale.join(', ')}`;
          if (t.quant.zero_point?.length) h += ` | zp: ${t.quant.zero_point.length > 4 ? t.quant.zero_point.slice(0,4).join(', ')+', ...' : t.quant.zero_point.join(', ')}`;
          h += '</div>';
        }
        h += '</div>';
      }
      h += '</div>';
    }
  }

  // RT info (OpenVINO)
  if (node.extra?.rtInfo) {
    h += rtInfoHtml('Runtime Info', node.extra.rtInfo);
  }

  details.innerHTML = h;
}

function portHtml(p, idx) {
  const shape = p.shape?.length ? '['+p.shape.join(', ')+']' : 'scalar';
  let h = `<div class="port"><span class="pid">${idx}</span><span class="pshape">${H(shape)}</span><span class="ptype">${H(p.type)}</span></div>`;
  if (p.name) h += `<div style="font-size:9px;color:#bbb;padding-left:4px;">${H(p.name)}</div>`;
  if (p.rtInfo) h += rtInfoInline(p.rtInfo);
  return h;
}

function rtInfoInline(info) {
  let h = '<div style="padding-left:4px;">';
  for (const [k,v] of Object.entries(info)) {
    if (typeof v === 'string') h += `<div style="font-size:9px;"><span class="tag">${H(k)}</span> <span style="font-family:monospace;color:#666;font-size:9px;">${H(v)}</span></div>`;
    else if (typeof v === 'object' && v) {
      h += `<div style="font-size:9px;"><span class="tag">${H(k)}</span>`;
      for (const [sk,sv] of Object.entries(v)) { const d = typeof sv==='object'?JSON.stringify(sv):String(sv); h += `<div style="padding-left:6px;font-size:9px;color:#777;">${H(sk)}: <span style="font-family:monospace;">${H(d)}</span></div>`; }
      h += '</div>';
    }
  }
  return h + '</div>';
}

function rtInfoHtml(title, info) {
  if (!info || !Object.keys(info).length) return '';
  let h = `<div class="sec"><div class="lbl">${H(title)}</div><table class="tbl">`;
  for (const [k,v] of Object.entries(info)) {
    if (typeof v === 'string') h += `<tr><td>${H(k)}</td><td>${H(v)}</td></tr>`;
    else if (typeof v === 'object' && v) {
      const d = Object.entries(v).map(([sk,sv])=>`${sk}: ${typeof sv==='object'?JSON.stringify(sv):sv}`).join(', ');
      h += `<tr><td>${H(k)}</td><td>${H(d)}</td></tr>`;
    }
  }
  return h + '</table></div>';
}

function sec(lbl, val) { return `<div class="sec"><div class="lbl">${H(lbl)}</div><div class="val">${val}</div></div>`; }

// --- FlatBuffer Builder (back-to-front, TFLite compatible) ---
class FBB {
  constructor(sz) {
    this.a = new ArrayBuffer(sz||4096); this.u = new Uint8Array(this.a); this.d = new DataView(this.a);
    this.sp = sz||4096; this.ma = 1; this.vt = null; this.vu = 0; this.oe = 0;
  }
  off() { return this.a.byteLength - this.sp; }
  _g(n) {
    if (this.sp >= n) return;
    let nc = this.a.byteLength; const used = nc - this.sp;
    while (nc < used + n) nc *= 2;
    const na = new ArrayBuffer(nc), nu = new Uint8Array(na);
    nu.set(this.u.subarray(this.sp), nc - used);
    this.sp = nc - used; this.a = na; this.u = nu; this.d = new DataView(na);
  }
  _p(n) { for (let i=0;i<n;i++) this.u[--this.sp]=0; }
  prep(sz, add) {
    if (sz>this.ma) this.ma=sz;
    const al=((~(this.a.byteLength-this.sp+add))+1)&(sz-1);
    this._g(al+sz+add); this._p(al);
  }
  wI8(v) { this._g(1); this.u[--this.sp]=v&0xff; }
  wI16(v) { this.sp-=2; this.d.setInt16(this.sp,v,true); }
  wI32(v) { this.sp-=4; this.d.setInt32(this.sp,v,true); }
  wU32(v) { this.sp-=4; this.d.setUint32(this.sp,v,true); }
  wF32(v) { this.sp-=4; this.d.setFloat32(this.sp,v,true); }
  wI64(v) { this.sp-=8; this.d.setUint32(this.sp,v>>>0,true); this.d.setInt32(this.sp+4,Math.floor(v/0x100000000),true); }
  pI8(v) { this.prep(1,0); this.wI8(v); }
  pI32(v) { this.prep(4,0); this.wI32(v); }
  pU32(v) { this.prep(4,0); this.wU32(v); }
  pOff(o) { this.prep(4,0); this.wI32(o?this.off()-o+4:0); }
  str(s) {
    if(s==null)return 0; const e=new TextEncoder().encode(s);
    this._g(e.length+5); this.wI8(0);
    for(let i=e.length-1;i>=0;i--)this.wI8(e[i]);
    this.pI32(e.length); return this.off();
  }
  vecI32(a) { this.prep(4,a.length*4); this.prep(4,a.length*4); for(let i=a.length-1;i>=0;i--){this.wI32(a[i]);} this.pI32(a.length); return this.off(); }
  vecF32(a) { this.prep(4,a.length*4); this.prep(4,a.length*4); for(let i=a.length-1;i>=0;i--){this.wF32(a[i]);} this.pI32(a.length); return this.off(); }
  vecI64(a) { this.prep(4,a.length*8); this.prep(8,a.length*8); for(let i=a.length-1;i>=0;i--){this.wI64(a[i]);} this.pI32(a.length); return this.off(); }
  vecU8(data) {
    // bulk copy for byte vectors (buffer data)
    this.prep(4,data.length); this.prep(1,data.length);
    this._g(data.length); this.sp-=data.length; this.u.set(data,this.sp);
    this.pI32(data.length); return this.off();
  }
  vecOff(a) { this.prep(4,a.length*4); this.prep(4,a.length*4); for(let i=a.length-1;i>=0;i--){this.pOff(a[i]);} this.pI32(a.length); return this.off(); }
  startObj(nf) { this.vt=new Array(nf).fill(0); this.vu=nf; this.oe=this.off(); }
  aI8(f,v,d) { if(v===d)return; this.prep(1,0); this.wI8(v); this.vt[f]=this.off(); }
  aI32(f,v,d) { if(v===d)return; this.prep(4,0); this.wI32(v); this.vt[f]=this.off(); }
  aU32(f,v,d) { if(v===d)return; this.prep(4,0); this.wU32(v); this.vt[f]=this.off(); }
  aOff(f,o) { if(!o)return; this.prep(4,0); this.wI32(this.off()-o+4); this.vt[f]=this.off(); }
  endObj() {
    this.pI32(0); const to=this.off();
    let tr=this.vu-1; while(tr>=0&&!this.vt[tr])tr--; tr++;
    for(let i=tr-1;i>=0;i--){this.prep(2,0);this.wI16(this.vt[i]?to-this.vt[i]:0);}
    this.prep(2,0);this.wI16(to-this.oe); this.prep(2,0);this.wI16((tr+2)*2);
    const vo=this.off();
    this.d.setInt32(this.a.byteLength-to,vo-to,true);
    this.vt=null; return to;
  }
  finish(ro) {
    this.prep(this.ma,4); this.pOff(ro);
    return new Uint8Array(this.a,this.sp,this.a.byteLength-this.sp);
  }
}

// --- Build a .tflite FlatBuffer from a subgraph of the parsed TFLite model ---
function buildCarvedTFLite(opIndices) {
  const m = tflParsed;
  const sg = m.subgraphs[0];
  const selOps = opIndices.sort((a,b)=>a-b);

  // Determine all tensor indices used by selected operators
  const producedBy = {}; // tensorIdx -> opIndex that produces it
  const consumedBy = {}; // tensorIdx -> [opIndex] that consume it
  for (let oi = 0; oi < sg.operators.length; oi++) {
    const op = sg.operators[oi];
    for (const ti of op.outputs) producedBy[ti] = oi;
    for (const ti of op.inputs) { if (ti>=0) { if(!consumedBy[ti])consumedBy[ti]=[]; consumedBy[ti].push(oi); } }
  }

  const selSet = new Set(selOps);
  const usedTensors = new Set();
  for (const oi of selOps) {
    const op = sg.operators[oi];
    for (const ti of op.inputs) if(ti>=0) usedTensors.add(ti);
    for (const ti of op.outputs) usedTensors.add(ti);
  }

  // New subgraph inputs: tensors consumed by selected ops, produced by non-selected (or original inputs/constants)
  const newInputs = [];
  const newOutputs = [];
  for (const ti of usedTensors) {
    const prod = producedBy[ti];
    const isConsumedBySelected = (consumedBy[ti]||[]).some(o => selSet.has(o));
    const isProducedBySelected = prod !== undefined && selSet.has(prod);
    const t = sg.tensors[ti];
    const isConstant = t && t.buffer > 0 && m.buffers[t.buffer]?.data;

    if (isConsumedBySelected && !isProducedBySelected && !isConstant) {
      newInputs.push(ti);
    }
    if (isProducedBySelected) {
      // Output if: consumed by non-selected op, or was original output, or not consumed by any selected op
      const consumedByNonSel = (consumedBy[ti]||[]).some(o => !selSet.has(o));
      const wasOrigOutput = sg.outputs.includes(ti);
      const notConsumedBySel = !(consumedBy[ti]||[]).some(o => selSet.has(o));
      if (consumedByNonSel || wasOrigOutput || notConsumedBySel) {
        newOutputs.push(ti);
      }
    }
  }

  // Collect all tensors in the carved subgraph (reorder: inputs first, then internal, then outputs)
  const allTensors = [...usedTensors].sort((a,b)=>a-b);
  const tensorRemap = {}; // old index -> new index
  for (let i = 0; i < allTensors.length; i++) tensorRemap[allTensors[i]] = i;

  // Collect unique opcode indices and remap
  const usedOpcodes = [...new Set(selOps.map(oi => sg.operators[oi].opcode_index))].sort((a,b)=>a-b);
  const opcRemap = {};
  for (let i = 0; i < usedOpcodes.length; i++) opcRemap[usedOpcodes[i]] = i;

  // Collect buffers and remap (buffer 0 is always empty)
  const usedBuffers = [0]; // buffer 0 = empty
  const bufRemap = {0: 0};
  for (const ti of allTensors) {
    const t = sg.tensors[ti];
    if (t.buffer > 0 && !bufRemap.hasOwnProperty(t.buffer)) {
      bufRemap[t.buffer] = usedBuffers.length;
      usedBuffers.push(t.buffer);
    }
  }

  // Build FlatBuffer
  const fb = new FBB(1024 * 1024);

  // 1. Buffers
  const bufOffsets = [];
  for (const bi of usedBuffers) {
    const bufData = m.buffers[bi]?.data;
    let dataOff = 0;
    if (bufData) dataOff = fb.vecU8(bufData);
    fb.startObj(1);
    if (dataOff) fb.aOff(0, dataOff);
    bufOffsets.push(fb.endObj());
  }
  const buffersVec = fb.vecOff(bufOffsets);

  // 2. Tensors
  const tensorOffsets = [];
  for (const ti of allTensors) {
    const t = sg.tensors[ti];
    const nameOff = fb.str(t.name || '');
    const shapeOff = t.shape.length ? fb.vecI32(t.shape) : 0;
    // Quantization
    let quantOff = 0;
    if (t.quant) {
      const scOff = t.quant.scale.length ? fb.vecF32(t.quant.scale) : 0;
      const zpOff = t.quant.zero_point.length ? fb.vecI64(t.quant.zero_point) : 0;
      const minOff = t.quant.min?.length ? fb.vecF32(t.quant.min) : 0;
      const maxOff = t.quant.max?.length ? fb.vecF32(t.quant.max) : 0;
      fb.startObj(7); // QuantizationParameters has 7 fields
      if (minOff) fb.aOff(0, minOff);
      if (maxOff) fb.aOff(1, maxOff);
      if (scOff) fb.aOff(2, scOff);
      if (zpOff) fb.aOff(3, zpOff);
      if (t.quant.quantized_dimension) fb.aI32(6, t.quant.quantized_dimension, 0);
      quantOff = fb.endObj();
    }
    fb.startObj(5); // Tensor has 5+ fields: shape, type, buffer, name, quantization
    if (shapeOff) fb.aOff(0, shapeOff);
    fb.aI8(1, t.type, 0);
    fb.aU32(2, bufRemap[t.buffer] || 0, 0);
    if (nameOff) fb.aOff(3, nameOff);
    if (quantOff) fb.aOff(4, quantOff);
    tensorOffsets.push(fb.endObj());
  }
  const tensorsVec = fb.vecOff(tensorOffsets);

  // 3. Operators
  const opOffsets = [];
  for (const oi of selOps) {
    const op = sg.operators[oi];
    const inArr = op.inputs.map(ti => ti < 0 ? -1 : (tensorRemap[ti] ?? -1));
    const outArr = op.outputs.map(ti => tensorRemap[ti] ?? -1);
    const inOff = fb.vecI32(inArr);
    const outOff = fb.vecI32(outArr);
    fb.startObj(3); // opcode_index, inputs, outputs (skip builtin_options)
    fb.aU32(0, opcRemap[op.opcode_index] ?? 0, 0);
    fb.aOff(1, inOff);
    fb.aOff(2, outOff);
    opOffsets.push(fb.endObj());
  }
  const opsVec = fb.vecOff(opOffsets);

  // 4. SubGraph
  const sgInputsOff = fb.vecI32(newInputs.map(ti => tensorRemap[ti]));
  const sgOutputsOff = fb.vecI32(newOutputs.map(ti => tensorRemap[ti]));
  const sgNameOff = fb.str('carved_subgraph');
  fb.startObj(5);
  fb.aOff(0, tensorsVec);
  fb.aOff(1, sgInputsOff);
  fb.aOff(2, sgOutputsOff);
  fb.aOff(3, opsVec);
  if (sgNameOff) fb.aOff(4, sgNameOff);
  const sgOff = fb.endObj();
  const sgVecOff = fb.vecOff([sgOff]);

  // 5. OperatorCodes
  const opcOffsets = [];
  for (const oci of usedOpcodes) {
    const opc = m.opCodes[oci];
    const customOff = opc.custom ? fb.str(opc.custom) : 0;
    fb.startObj(4);
    fb.aI8(0, Math.min(opc.code, 127), 0); // deprecated_builtin_code (i8, clamped)
    if (customOff) fb.aOff(1, customOff);
    fb.aI32(2, opc.version || 1, 0);
    fb.aI32(3, opc.code, 0); // builtin_code (i32)
    opcOffsets.push(fb.endObj());
  }
  const opcVecOff = fb.vecOff(opcOffsets);

  // 6. Description
  const descOff = fb.str('Carved subgraph');

  // 7. Model root
  fb.startObj(5);
  fb.aU32(0, 3, 0); // version = 3 (schema v3)
  fb.aOff(1, opcVecOff);
  fb.aOff(2, sgVecOff);
  if (descOff) fb.aOff(3, descOff);
  fb.aOff(4, buffersVec);
  const modelOff = fb.endObj();

  return fb.finish(modelOff);
}

function validateAndCarve() {
  if (!tflParsed || carveSet.size === 0) return;

  // Map selected node IDs to TFLite op indices
  const opIndices = [];
  for (const n of graph.nodes) {
    if (carveSet.has(n.id) && n.category === CAT.op && n.extra?.opIndex !== undefined) {
      opIndices.push(n.extra.opIndex);
    }
  }
  if (opIndices.length === 0) {
    alert('No operator nodes selected. Select operator nodes (not inputs/constants/outputs) to carve.');
    return;
  }

  try {
    const data = buildCarvedTFLite(opIndices);
    // Download
    const blob = new Blob([data], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'carved_subgraph.tflite';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Carve failed: ' + err.message);
    console.error(err);
  }
}

// --- Selection UI ---
function updateCarveUI() {
  const opCount = [...carveSet].filter(id => graph?.nodes.find(n=>n.id===id)?.category === CAT.op).length;
  $('btn-carve').style.display = opCount > 0 ? '' : 'none';
  $('btn-clear-sel').style.display = carveSet.size > 0 ? '' : 'none';
  $('sel-info').textContent = carveSet.size > 0 ? `${opCount} ops selected` : '';
  // Update node visuals
  rootG.querySelectorAll('.node').forEach(n => {
    n.classList.toggle('carved', carveSet.has(n.dataset.id));
  });
}

function toggleCarveNode(id) {
  if (carveSet.has(id)) carveSet.delete(id); else carveSet.add(id);
  updateCarveUI();
}

function screenToGraph(sx, sy) {
  const r = garea.getBoundingClientRect();
  return { x: (sx - r.left - tx) / sc, y: (sy - r.top - ty) / sc };
}

// Select mode button
$('btn-select').addEventListener('click', function() {
  selectMode = !selectMode;
  this.classList.toggle('active', selectMode);
  svgEl.classList.toggle('selecting', selectMode);
});
$('btn-carve').addEventListener('click', validateAndCarve);
$('btn-clear-sel').addEventListener('click', () => { carveSet.clear(); updateCarveUI(); });

// Rectangle drag selection in select mode
const selRectEl = $('sel-rect');
svgEl.addEventListener('mousedown', function(e) {
  if (!selectMode || e.button !== 0) return;
  // Don't start selection if clicking directly on a node
  if (e.target.closest('.node')) {
    // Toggle that node
    const nodeG = e.target.closest('.node');
    if (nodeG) { e.stopPropagation(); toggleCarveNode(nodeG.dataset.id); }
    return;
  }
  e.preventDefault();
  selDrag = { sx: e.clientX, sy: e.clientY };
  selRectEl.style.display = '';
});

window.addEventListener('mousemove', function(e) {
  if (!selDrag) return;
  const r = garea.getBoundingClientRect();
  const x1 = Math.min(selDrag.sx, e.clientX) - r.left;
  const y1 = Math.min(selDrag.sy, e.clientY) - r.top;
  const x2 = Math.max(selDrag.sx, e.clientX) - r.left;
  const y2 = Math.max(selDrag.sy, e.clientY) - r.top;
  selRectEl.setAttribute('x', x1);
  selRectEl.setAttribute('y', y1);
  selRectEl.setAttribute('width', x2 - x1);
  selRectEl.setAttribute('height', y2 - y1);
});

window.addEventListener('mouseup', function(e) {
  if (!selDrag) return;
  // Compute graph-space rectangle
  const g1 = screenToGraph(Math.min(selDrag.sx, e.clientX), Math.min(selDrag.sy, e.clientY));
  const g2 = screenToGraph(Math.max(selDrag.sx, e.clientX), Math.max(selDrag.sy, e.clientY));
  selDrag = null;
  selRectEl.style.display = 'none';

  // Only count as drag if area > 100 sq pixels screen
  const rr = garea.getBoundingClientRect();
  const dx = g2.x - g1.x, dy = g2.y - g1.y;
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return; // too small, ignore

  // Select all nodes whose center falls within the rectangle
  rootG.querySelectorAll('.node').forEach(nd => {
    const t = nd.getAttribute('transform');
    const m = t?.match(/translate\(([\d.e+-]+),([\d.e+-]+)\)/);
    if (!m) return;
    const cx = parseFloat(m[1]) + NW/2, cy = parseFloat(m[2]) + NH/2;
    if (cx >= g1.x && cx <= g2.x && cy >= g1.y && cy <= g2.y) {
      carveSet.add(nd.dataset.id);
    }
  });
  updateCarveUI();
});

// Expose
window.navTo = navTo;
</script>
